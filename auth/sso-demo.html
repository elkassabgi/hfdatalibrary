<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>ElkassabgiData SSO — demo</title>
<style>
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;background:#0f1729;color:#e5e7eb}
  .card{background:#141c2e;border:1px solid rgba(212,168,67,.3);border-radius:14px;padding:2rem;max-width:520px;width:92%}
  h1{color:#d4a843;font-size:1.15rem;margin:.2rem 0 1rem}
  button{background:#d4a843;color:#0f1729;border:0;border-radius:8px;padding:.65rem 1.2rem;font-weight:700;cursor:pointer;margin:.2rem .3rem .2rem 0}
  button.ghost{background:transparent;color:#d4a843;border:1px solid rgba(212,168,67,.5)}
  pre{background:#0f1729;border:1px solid #2a3550;border-radius:8px;padding:.8rem;overflow:auto;font-size:.8rem;color:#9ca3af;white-space:pre-wrap;word-break:break-all}
  .row{margin:.6rem 0}
</style>
</head>
<body>
  <div class="card">
    <h1>ElkassabgiData family sign-in — demo</h1>
    <p style="color:#9ca3af;font-size:.9rem">Reference integration of the popup SSO SDK. One ElkassabgiData account across every library.</p>
    <div class="row">
      <button id="login">Log in</button>
      <button id="register" class="ghost">Sign up</button>
      <button id="call" class="ghost">Call data API</button>
      <button id="logout" class="ghost">Log out</button>
    </div>
    <div class="row"><strong>Status:</strong> <span id="status">checking…</span></div>
    <pre id="out">—</pre>
  </div>

  <script src="https://accounts.elkassabgidata.com/sdk/ekd-sso.js"></script>
  <script>
    var out = document.getElementById('out');
    var statusEl = document.getElementById('status');
    var lines = [];
    function ts(){ try { return new Date().toISOString().slice(11,19); } catch(e){ return ''; } }
    function log(x){ lines.push('['+ts()+'] ' + ((typeof x === 'string') ? x : JSON.stringify(x))); if (lines.length>40) lines.shift(); out.textContent = lines.join('\n'); }
    function setStatus(s){ statusEl.textContent = s; }

    // Diagnostics: surface anything that goes wrong, and observe the two handoff
    // channels directly (so we can see whether the code even reaches this page).
    window.addEventListener('error', function(e){ log('JS ERROR: ' + (e.message || e) + (e.filename ? (' @ '+e.filename+':'+e.lineno) : '')); });
    window.addEventListener('unhandledrejection', function(e){ log('UNHANDLED REJECTION: ' + (e.reason && (e.reason.message || e.reason))); });
    window.addEventListener('message', function(ev){ if (ev.data && ev.data.type==='ekd_auth') log('◀ postMessage from ' + ev.origin + ' — code:' + (ev.data.code?'yes':'no') + ' state:' + String(ev.data.state||'').slice(0,6)); });
    try { var dbg = new BroadcastChannel('ekd_auth'); dbg.onmessage = function(ev){ if (ev.data && ev.data.type==='ekd_auth') log('◀ BroadcastChannel — code:' + (ev.data.code?'yes':'no')); }; } catch(e){}

    EKD.init();
    setStatus(EKD.isLoggedIn() ? 'session found — resuming…' : 'signed out');
    log('SDK ready. clientId=' + EKD.clientId + ' isLoggedIn=' + EKD.isLoggedIn());
    EKD.on('login',  function(){ setStatus('signed in'); log('✔ SDK event: LOGIN (token acquired)'); });
    EKD.on('logout', function(){ setStatus('signed out'); log('SDK event: logout'); });

    document.getElementById('login').onclick = function(){
      log('→ EKD.login() — opening popup');
      EKD.login().then(function(){ log('✔ login() RESOLVED — signed in'); }).catch(function(e){ log('✘ login() REJECTED: ' + (e && e.message)); });
    };
    document.getElementById('register').onclick = function(){
      log('→ EKD.login({register}) — opening popup');
      EKD.login({ tab: 'register' }).then(function(){ log('✔ register RESOLVED'); }).catch(function(e){ log('✘ register REJECTED: ' + (e && e.message)); });
    };
    document.getElementById('logout').onclick = function(){ log('→ EKD.logout()'); EKD.logout(); };
    document.getElementById('call').onclick = async function(){
      log('→ getAccessToken()');
      var at = await EKD.getAccessToken();
      if (!at) { log('No access token — log in first.'); return; }
      log('Got token. Calling /v1/bars/AAPL…');
      try {
        var r = await fetch('https://api.hfdatalibrary.com/v1/bars/AAPL?limit=1', { headers: { 'Authorization': 'Bearer ' + at } });
        log('data API → HTTP ' + r.status);
      } catch (e) { log('Fetch error: ' + (e && e.message)); }
    };
  </script>
</body>
</html>
