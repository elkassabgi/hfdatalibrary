<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Signing in…</title>
<style>
  html,body{height:100%}
  body{margin:0;display:flex;align-items:center;justify-content:center;
    font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:#0f1729;color:#9ca3af}
  .m{text-align:center}
  .m strong{color:#d4a843}
  .m a{color:#d4a843}
  .ret{margin-top:.6rem;font-size:.85rem}
</style>
</head>
<body>
  <div class="m"><p id="msg"><strong>ElkassabgiData</strong><br>Completing sign-in…</p><p class="ret"><a href="/">Return to the site</a></p></div>
  <script>
  (function () {
    var hasCode = false, hasOpener = false;
    try {
      var p = new URLSearchParams(location.hash.slice(1));
      var msg = { type: 'ekd_auth', code: p.get('code') || '', state: p.get('state') || '' };
      hasCode = !!msg.code;
      try { hasOpener = !!(window.opener && !window.opener.closed); } catch (e) {}
      try { history.replaceState(null, '', location.pathname); } catch (e) {}
      // Deliver on BOTH channels every time; the SDK de-dupes by state.
      try { if (hasOpener) window.opener.postMessage(msg, location.origin); } catch (e) {}
      if ('BroadcastChannel' in window) {
        try { var bc = new BroadcastChannel('ekd_auth'); bc.postMessage(msg); setTimeout(function(){ try{ bc.close(); }catch(e){} }, 400); } catch (e) {}
      }
    } catch (e) {}
    // Diagnostic beacon → shows in the worker tail so we can confirm the callback
    // actually ran on the returning-user flow (temporary; remove after debugging).
    try { new Image().src = 'https://accounts.elkassabgidata.com/sdk/ekd-sso.js?cbdiag=1&code=' + (hasCode ? 1 : 0) + '&opener=' + (hasOpener ? 1 : 0) + '&t=' + Date.now(); } catch (e) {}
    setTimeout(function () { try { window.close(); } catch (e) {} }, 1500);
  })();
  </script>
</body>
</html>
