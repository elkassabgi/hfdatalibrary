<svg width="560" height="150" viewBox="0 0 560 150" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="ElkassabgiData">
  <!-- ElkassabgiData — official family logo (variant B: Metallic Gloss, on-navy).
       Chosen by Ahmed Elkassabgi 2026-07-14. Gold 3D "Elkassabgi", white 3D "Data",
       solid gold plate frame with bevel, drop shadowbox. -->
  <defs>
    <linearGradient id="ekdGold" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff3c4"/><stop offset=".38" stop-color="#e9c05b"/>
      <stop offset=".5" stop-color="#a87d24"/><stop offset=".62" stop-color="#d4a843"/>
      <stop offset="1" stop-color="#f7e2a0"/>
    </linearGradient>
    <linearGradient id="ekdWhite" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/><stop offset=".38" stop-color="#eef1f6"/>
      <stop offset=".5" stop-color="#b9c2d0"/><stop offset=".62" stop-color="#dfe5ec"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="ekdFrameOuter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffe9a8"/><stop offset=".5" stop-color="#c89b38"/><stop offset="1" stop-color="#6b5318"/>
    </linearGradient>
    <linearGradient id="ekdFrameInner" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#ffe9a8"/><stop offset=".5" stop-color="#c89b38"/><stop offset="1" stop-color="#6b5318"/>
    </linearGradient>
    <linearGradient id="ekdBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#232f47"/><stop offset="1" stop-color="#0e1523"/>
    </linearGradient>
    <filter id="ekdShadow" x="-20%" y="-20%" width="140%" height="170%">
      <feDropShadow dx="0" dy="12" stdDeviation="14" flood-color="#000" flood-opacity="0.6"/>
    </filter>
  </defs>
  <g filter="url(#ekdShadow)">
    <rect x="6" y="6" width="548" height="138" rx="16" fill="url(#ekdFrameOuter)"/>
    <rect x="16" y="16" width="528" height="118" rx="10" fill="url(#ekdFrameInner)"/>
    <rect x="20" y="20" width="520" height="110" rx="8" fill="url(#ekdBg)"/>
  </g>
  <g font-family="Georgia, 'Times New Roman', serif" font-weight="700" font-size="53" text-anchor="middle">
    <g aria-hidden="true">
      <text x="282.5" y="97.5" fill="#2e2205">Elkassabgi<tspan fill="#2a303c">Data</tspan></text>
      <text x="281.5" y="95.5" fill="#573f0b">Elkassabgi<tspan fill="#454d5c">Data</tspan></text>
      <text x="280.5" y="93.5" fill="#815f14">Elkassabgi<tspan fill="#5e6878">Data</tspan></text>
    </g>
    <text x="279" y="91" fill="url(#ekdGold)">Elkassabgi<tspan fill="url(#ekdWhite)">Data</tspan></text>
    <text x="279" y="90" fill="#ffffff" opacity=".14" aria-hidden="true">ElkassabgiData</text>
  </g>
</svg>
