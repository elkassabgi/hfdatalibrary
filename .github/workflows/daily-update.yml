name: Daily Data Update

on:
  schedule:
    # Tuesday-Saturday at 6 AM UTC (after IEX publishes the previous day's pcap)
    - cron: '0 6 * * 2-6'
  workflow_dispatch:
    inputs:
      date:
        description: 'Specific date to process (YYYY-MM-DD). Leave blank for previous trading day.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no R2 writes)'
        type: boolean
        default: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Run daily update
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            hfdatalibrary-data
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python pipeline/daily_update.py $ARGS

      - name: Commit and push metadata
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "HF Data Library Bot"
          git config user.email "admin@hfdatalibrary.com"
          git add data/metadata.json
          if git diff --cached --quiet; then
            echo "No metadata changes to commit"
          else
            git commit -m "Daily data update: $(date -u +%Y-%m-%d)"
            git push
          fi
