name: Daily Data Update

on:
  schedule:
    # Tuesday-Saturday at 6 AM UTC (after IEX publishes the previous day's pcap)
    - cron: '0 6 * * 2-6'
  workflow_dispatch:
    inputs:
      date:
        description: 'Specific date to process (YYYY-MM-DD). Leave blank for previous trading day.'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no R2 writes)'
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 720
    steps:
      - name: Free disk space (remove pre-installed tools we don't need)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: pipeline/requirements.txt

      - name: Install Python dependencies
        run: pip install -r pipeline/requirements.txt

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: false

      - name: Build Go pcap extractor
        run: |
          cd pipeline/pcap_extract
          go build -o pcap_extract .
          echo "Built: $(ls -lh pcap_extract)"

      - name: Show disk space
        run: df -h /

      - name: Run daily update
        env:
          R2_ACCESS_KEY_ID:     ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_ENDPOINT:          ${{ secrets.R2_ENDPOINT }}
          R2_BUCKET:            hfdatalibrary-data
          RESEND_API_KEY:       ${{ secrets.RESEND_API_KEY }}
        run: |
          ARGS=""
          if [ -n "${{ github.event.inputs.date }}" ]; then
            ARGS="${{ github.event.inputs.date }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python pipeline/daily_update.py $ARGS

      - name: Commit and push metadata
        id: commit
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          git config user.name "HF Data Library Bot"
          git config user.email "admin@hfdatalibrary.com"
          git add data/metadata.json
          if git diff --cached --quiet; then
            echo "No metadata changes to commit"
            echo "committed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Daily data update: $(date -u +%Y-%m-%d)"
            git pull --rebase
            git push
            echo "committed=true" >> "$GITHUB_OUTPUT"
          fi

      # Pushes made via GITHUB_TOKEN don't trigger other workflows (anti-recursion),
      # so deploy.yml won't fire on bot commits. Deploy inline here instead — the
      # checkout tree already has the committed metadata.
      - name: Deploy to Cloudflare Pages
        if: ${{ github.event.inputs.dry_run != 'true' && steps.commit.outputs.committed == 'true' }}
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy . --project-name=hfdatalibrary --branch=main
