<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify Email — HF Data Library</title>
  <meta name="robots" content="noindex">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <a href="../index.html" class="navbar-brand">HF Data <span>Library</span></a>
  </div>
</nav>

<section class="section">
  <div class="container" style="max-width:500px; text-align:center;">
    <div id="verify-status">
      <h2>Verifying your email...</h2>
      <p style="color: var(--gray-500);">Please wait.</p>
    </div>
  </div>
</section>

<script>
(async function() {
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  const el = document.getElementById('verify-status');

  if (!token) {
    el.innerHTML = '<h2>Invalid link</h2><p style="color:var(--gray-500);">No verification token found. Please check the link in your email.</p>';
    return;
  }

  try {
    const r = await fetch('https://api.hfdatalibrary.com/v1/auth/verify', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token })
    });
    const data = await r.json();

    if (r.ok) {
      el.innerHTML =
        '<div style="background:#ecfdf5; border:1px solid #a7f3d0; border-radius:12px; padding:2.5rem;">' +
          '<h2 style="color:#065f46; margin-bottom:0.5rem;">Email verified!</h2>' +
          '<p style="color:#047857;">Your account is now active. You can download data and use the API.</p>' +
          '<a href="download.html" class="btn btn-primary" style="margin-top:1rem;">Go to Downloads</a>' +
        '</div>';
    } else {
      el.innerHTML =
        '<div style="background:#fef2f2; border:1px solid #fecaca; border-radius:12px; padding:2.5rem;">' +
          '<h2 style="color:#991b1b; margin-bottom:0.5rem;">Verification failed</h2>' +
          '<p style="color:#dc2626;">' + (data.error || 'Invalid or expired link.') + '</p>' +
          '<p style="margin-top:1rem;"><a href="download.html#register">Register again</a> or contact <a href="mailto:aelkassabgi@uca.edu">aelkassabgi@uca.edu</a></p>' +
        '</div>';
    }
  } catch (e) {
    el.innerHTML = '<h2 style="color:var(--red);">Connection error</h2><p>Please try again later.</p>';
  }
})();
</script>

</body>
</html>
