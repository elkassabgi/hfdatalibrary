<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — HF Data Library</title>
  <meta name="description" content="Reset your HF Data Library account password through the secure email-based recovery flow.">
  <link rel="canonical" href="https://hfdatalibrary.com/pages/reset">
  <meta name="robots" content="noindex">
  <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/style.css?v=20260714">
</head>
<body>

<nav class="navbar">
  <div class="container">
    <span class="navbar-brand-group"><a href="../" class="navbar-brand">HF Data <span>Library</span></a><a class="navbar-fam" href="https://elkassabgidata.com" title="Part of the ElkassabgiData family — one account, every library">part of ElkassabgiData</a></span>
  </div>
</nav>

<section class="section">
  <div class="container" style="max-width:400px;">
    <h2 style="text-align:center; margin-bottom:1.5rem;">Reset password</h2>

    <!-- 1.1: reset-REQUEST form. Shown when there is NO ?token= — this replaces the
         old dead "Invalid link. No reset token found." state so a bare /pages/reset
         visit is a working "email me a link" flow. Posts to the M3-gated endpoint. -->
    <div id="request-form" class="register-form" style="max-width:100%; display:none;">
      <p style="font-size:0.9rem; color:var(--gray-600); margin-bottom:1rem;">This resets the password for your ElkassabgiData account &mdash; the single account used by hfdatalibrary.com, econdatalibrary.com, and all our libraries.</p>
      <div class="form-group">
        <label for="request-email">Email</label>
        <input type="email" id="request-email" placeholder="you@example.com" autocomplete="email">
      </div>
      <button class="btn btn-primary" style="width:100%;" onclick="requestReset()">Email me a reset link</button>
      <div id="request-result" style="margin-top:1rem; display:none;"></div>
    </div>

    <!-- completion form: shown when arriving from the emailed link (?token=…). Behavior unchanged. -->
    <div id="reset-form" class="register-form" style="max-width:100%; display:none;">
      <div class="form-group">
        <label for="new-password">New password</label>
        <input type="password" id="new-password" placeholder="Minimum 8 characters">
      </div>
      <div class="form-group">
        <label for="confirm-password">Confirm password</label>
        <input type="password" id="confirm-password" placeholder="Repeat password">
      </div>
      <button class="btn btn-primary" style="width:100%;" onclick="resetPassword()">Set New Password</button>
      <div id="reset-result" style="margin-top:1rem; display:none;"></div>
    </div>
  </div>
</section>

<script>
const token = new URLSearchParams(window.location.search).get('token');

// No token => reset REQUEST (previously a dead "Invalid link" page); token present
// => the completion form arrived from the emailed link. Reveal exactly one.
if (token) {
  document.getElementById('reset-form').style.display = '';
} else {
  document.getElementById('request-form').style.display = '';
}

async function requestReset() {
  const email = document.getElementById('request-email').value.trim();
  const result = document.getElementById('request-result');
  if (!email || email.indexOf('@') === -1) {
    result.style.display = 'block';
    result.innerHTML = '<p style="color:var(--red);">Enter your email address.</p>';
    return;
  }
  // The backend returns a neutral 200 whether or not the address exists (no
  // account enumeration), so the page shows the SAME success either way — and
  // even on a network error, to never leak existence. [§9 D83]
  try {
    await fetch('https://api.hfdatalibrary.com/v1/auth/reset-request', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
  } catch (e) { /* fall through to the same neutral message */ }
  document.getElementById('request-form').innerHTML =
    '<div style="background:#ecfdf5; border:1px solid #a7f3d0; border-radius:8px; padding:1.5rem;">' +
      '<strong style="color:#065f46;">Check your email</strong>' +
      '<p style="color:#047857; margin-top:0.5rem;">If an account exists for that address, we&rsquo;ve emailed a password-reset link. ' +
      'Don&rsquo;t see it within a minute? Check your spam or junk folder. ' +
      'Once reset, click <a href="download#register">Sign in</a> &mdash; one account works across all ElkassabgiData libraries.</p>' +
    '</div>';
}

async function resetPassword() {
  const password = document.getElementById('new-password').value;
  const confirm = document.getElementById('confirm-password').value;
  const result = document.getElementById('reset-result');

  if (password.length < 8) { result.style.display='block'; result.innerHTML='<p style="color:var(--red);">Minimum 8 characters.</p>'; return; }
  if (password !== confirm) { result.style.display='block'; result.innerHTML='<p style="color:var(--red);">Passwords do not match.</p>'; return; }

  try {
    const r = await fetch('https://api.hfdatalibrary.com/v1/auth/reset', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ token, password })
    });
    const data = await r.json();
    result.style.display = 'block';

    if (r.ok) {
      document.getElementById('reset-form').innerHTML =
        '<div style="background:#ecfdf5; border:1px solid #a7f3d0; border-radius:8px; padding:1.5rem; text-align:center;">' +
          '<strong style="color:#065f46;">Password reset!</strong>' +
          '<p style="color:#047857; margin-top:0.5rem;">You can now <a href="download#register">log in</a> with your new password.</p>' +
        '</div>';
    } else {
      result.innerHTML = '<p style="color:var(--red);">' + (data.error || 'Reset failed.') + '</p>';
    }
  } catch (e) {
    result.style.display = 'block';
    result.innerHTML = '<p style="color:var(--red);">Connection error.</p>';
  }
}
</script>

</body>
</html>
